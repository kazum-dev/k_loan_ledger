<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>ログイン | K's Loan Ledger</title>
</head>
<body>
    <h1>K's Loan Ledger</h1>
    <h2>ログイン</h2>

    {% if error %}
        <div style="color: red;">
            <p>{{ error }}</p>
        </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
        <div>
            <label for="username">ユーザー名</label>
            <input
                type="text"
                id="username"
                name="username"
                value="{{ username }}"
                autocomplete="username"
                required
                autofocus
            >
        </div>

        <div>
            <label for="password">パスワード</label>
            <input
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                required
            >
        </div>

        <button type="submit">ログイン</button>
    </form>
</body>
</html>
