<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>契約解除登録 | K's Loan Ledger</title>
</head>
<body>
    <h1>契約解除登録</h1>

    <p>指定した貸付IDの契約状態を CANCELLED に更新します。</p>

    <nav>
        <ul>
            <li><a href="{{ url_for('home') }}">トップページ</a></li>
            <li><a href="{{ url_for('loan_list') }}">貸付一覧</a></li>
            <li><a href="{{ url_for('repayment_list') }}">返済一覧</a></li>
            <li><a href="{{ url_for('customer_list') }}">顧客一覧</a></li>
            <li><a href="{{ url_for('loan_status') }}">未返済・延滞一覧</a></li>
            <li><a href="{{ url_for('overdue_loans') }}">延滞貸付一覧</a></li>
            <li><a href="{{ url_for('loan_new') }}">貸付登録</a></li>
            <li><a href="{{ url_for('repayment_new') }}">返済登録</a></li>
            <li><a href="/customers/new">顧客登録</a></li>
            <li><a href="{{ url_for('loan_cancel') }}">契約解除登録</a></li>
        </ul>
    </nav>

    {% if errors %}
        <ul>
            {% for error in errors %}
                <li style="color: red;">{{ error }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="post">
        <div>
            <label for="loan_id">貸付ID</label><br>
            <input
                type="text"
                id="loan_id"
                name="loan_id"
                value="{{ form_data.get('loan_id', '') }}"
            >
        </div>

        <br>

        <div>
            <label for="cancel_reason">契約解除理由</label><br>
            <textarea
                id="cancel_reason"
                name="cancel_reason"
                rows="4"
                cols="50"
            >{{ form_data.get('cancel_reason', '') }}</textarea>
        </div>

        <br>

        <button type="submit">契約解除を登録する</button>
    </form>
</body>
</html>
