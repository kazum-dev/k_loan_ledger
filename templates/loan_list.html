<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸付一覧｜K's Loan Ledger</title>
</head>
<body>
    <h1>貸付一覧</h1>

    <nav>
        <ul>
            <li><a href="{{ url_for('home') }}">トップページ</a></li>
            <li><a href="{{ url_for('loan_list') }}">貸付一覧</a></li>
            <li><a href="{{ url_for('repayment_list') }}">返済一覧</a></li>
            <li><a href="{{ url_for('customer_list') }}">顧客一覧</a></li>
        </ul>
    </nav>
    
    <p>登録されている貸付データを一覧表示しています。</p>

    <table border="1">
        <thead>
            <tr>
                <th>貸付ID</th>
                <th>顧客ID</th>
                <th>貸付金額</th>
                <th>貸付日</th>
                <th>返済期日</th>
            </tr>
        </thead>
        <tbody>
            {% for loan in loans %}
            <tr>
                <td>{{ loan.loan_id }}</td>
                <td>{{ loan.customer_id }}</td>
                <td>{{ "{:,}".format(loan.loan_amount | int) }}</td>
                <td>{{ loan.loan_date }}</td>
                <td>{{ loan.due_date }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
