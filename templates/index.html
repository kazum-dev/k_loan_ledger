<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K's Loan Ledger</title>
</head>
<body>
    <h1>K's Loan Ledger</h1>

    <p>貸付・返済・顧客を管理するアプリです。</p>

    <h2>アプリ概要</h2>
    <p>
       このアプリでは、顧客情報、貸付記録、返済記録を一覧で確認し、
       管理できるようにすることを目的としています。 
    </p>

    <h2>データ概要</h2>
    <ul>
        <li>顧客数：{{ customer_count }}</li>
        <li>貸付件数：{{ loan_count }}</li>
        <li>返済件数：{{ repayment_count }}</li>
    </ul>

    <h2>メニュー</h2>
    <ul>
        <li><a href="/loans">貸付一覧を見る</a></li>
        <li><a href="/repayments">返済一覧を見る</a></li>
        <li><a href="/customers">顧客一覧を見る</a></li>
    </ul>    
</body>
</html>
