<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K's Loan Ledger</title>
</head>
<body>
    <h1>K's Loan Ledger</h1>

    <nav>
        <ul>
            <li><a href="{{ url_for('home') }}">トップページ</a></li>
            <li><a href="{{ url_for('loan_list') }}">貸付一覧</a></li>
            <li><a href="{{ url_for('repayment_list') }}">返済一覧</a></li>
            <li><a href="{{ url_for('customer_list') }}">顧客一覧</a></li>
            <li><a href="{{ url_for('loan_status') }}">未返済・延滞一覧</a></li>
            <li><a href="{{ url_for('loan_new') }}">貸付登録</a></li>
        </ul>
    </nav>

    <p>貸付・返済・顧客を管理するアプリです。</p>

    <h2>アプリ概要</h2>
    <p>
       このアプリでは、顧客情報、貸付記録、返済記録を一覧で確認し、
       管理できるようにすることを目的としています。 
    </p>

    <h2>データ概要</h2>
    <ul>
        <li>顧客数：{{ customer_count }}</li>
        <li>貸付件数：{{ loan_count }}</li>
        <li>返済件数：{{ repayment_count }}</li>
    </ul>
</body>
</html>
