<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客一覧｜K's Loan Ledger</title>
</head>
<body>
    <h1>顧客一覧</h1>

    <nav>
        <ul>
            <li><a href="{{ url_for('home') }}">トップページ</a></li>
            <li><a href="{{ url_for('loan_list') }}">貸付一覧</a></li>
            <li><a href="{{ url_for('repayment_list') }}">返済一覧</a></li>
            <li><a href="{{ url_for('customer_list') }}">顧客一覧</a></li>
            <li><a href="{{ url_for('loan_status') }}">未返済・延滞一覧</a></li>
        </ul>
    </nav>

    <p>登録されている顧客データを一覧表示しています。</p>

    <table border="1">
        <thead>
            <tr>
                <th>顧客ID</th>
                <th>顧客名</th>
                <th>貸付上限額</th>
            </tr>
        </thead>
        <tbody>
            {% for customer in customers %}
            <tr>
                <td>{{ customer.customer_id }}</td>
                <td>{{ customer.customer_name }}</td>
                <td>{{ "{:,}".format(customer.credit_limit | int) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
